<svg class="site-logo" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-label="Logo Consorzio Logistico Latina Scalo">
  <!-- Abstract hexagonal logistics node -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2b4a"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
  </defs>
  <!-- Outer hexagon frame -->
  <polygon points="40,4 72,22 72,58 40,76 8,58 8,22" fill="url(#logoGrad)" stroke="none"/>
  <!-- Inner cut - creating depth -->
  <polygon points="40,12 64,26 64,54 40,68 16,54 16,26" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Three converging routes -->
  <path d="M20,46 L40,36" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M60,46 L40,36" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M40,64 L40,36" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Central hub node -->
  <circle cx="40" cy="36" r="6" fill="#e67e22"/>
  <circle cx="40" cy="36" r="3" fill="#fff"/>
  <!-- Endpoint nodes -->
  <circle cx="20" cy="46" r="3.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="60" cy="46" r="3.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="40" cy="64" r="3.5" fill="rgba(255,255,255,0.7)"/>
  <!-- Forward arrow emerging from hub -->
  <path d="M40,28 L40,16 M36,20 L40,16 L44,20" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
